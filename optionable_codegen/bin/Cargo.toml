[package]
name = "optionable_codegen_cli"
version = "0.1.0"
edition = "2024"
rust-version = "1.88.0"
description = "Implementation of the codegen cli"
repository = "https://github.com/ngergs/optionable"
license = "MIT OR Apache-2.0"
readme = "README.md"
publish = false

[features]
default = []
k8s_openapi = ["optionable_codegen/k8s_openapi"]

[lints.clippy]
pedantic = "warn"

[dependencies]
optionable_codegen = "0.14.2"
quote = "1.0.45"
syn = { version = "2.0.118", default-features = false, features = ["proc-macro", "derive", "visit"] }
proc-macro2 = "1.0.106"
darling = { version = "0.23.0", default-features = false }
clap = { version = "4.6.1", features = ["derive"] }
prettyplease = "0.2.37"
openapiv3 = "2.2.0"
serde_json = "1.0.150"
k8s-openapi-codegen-common = "0.28.0"

[dev-dependencies]
assert_cmd = "2.2.2"
tempfile = "3.27.0"
